<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="'SF Mono','Cascadia Code','Consolas',monospace" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2ECC71"/>
    </marker>
    <marker id="arrow-dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#30363d"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" rx="12" fill="#0d1117"/>

  <!-- Outer loop label -->
  <rect x="30" y="20" width="820" height="64" rx="8" fill="#161b22" stroke="#2ECC71" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="440" y="45" text-anchor="middle" fill="#2ECC71" font-size="14" font-weight="bold">Meta-Agent — weekly outer loop</text>
  <text x="440" y="65" text-anchor="middle" fill="#484f58" font-size="11">evaluates pipeline fitness · tunes prompts · adjusts scoring · audits sources</text>

  <!-- Arrow from outer to inner -->
  <line x1="440" y1="84" x2="440" y2="110" stroke="#2ECC71" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Inner pipeline container -->
  <rect x="30" y="112" width="820" height="390" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="50" y="136" fill="#484f58" font-size="11">INNER PIPELINE — daily or on-demand</text>

  <!-- Row 1: lens → digest → strategize → analyze → challenge -->
  <!-- Lens -->
  <rect x="55" y="156" width="110" height="52" rx="6" fill="#0d1117" stroke="#2ECC71" stroke-width="1.5"/>
  <text x="110" y="178" text-anchor="middle" fill="#2ECC71" font-weight="bold" font-size="13">lens</text>
  <text x="110" y="196" text-anchor="middle" fill="#484f58" font-size="9">perception</text>

  <!-- Arrow -->
  <line x1="165" y1="182" x2="195" y2="182" stroke="#2ECC71" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Digest -->
  <rect x="200" y="156" width="110" height="52" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="255" y="178" text-anchor="middle" fill="#c9d1d9" font-weight="bold" font-size="13">digest</text>
  <text x="255" y="196" text-anchor="middle" fill="#484f58" font-size="9">triage</text>

  <!-- Arrow -->
  <line x1="310" y1="182" x2="340" y2="182" stroke="#2ECC71" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Strategize -->
  <rect x="345" y="156" width="110" height="52" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="178" text-anchor="middle" fill="#c9d1d9" font-weight="bold" font-size="13">strategize</text>
  <text x="400" y="196" text-anchor="middle" fill="#484f58" font-size="9">planning</text>

  <!-- Arrow -->
  <line x1="455" y1="182" x2="485" y2="182" stroke="#2ECC71" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Analyze -->
  <rect x="490" y="156" width="110" height="52" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="545" y="178" text-anchor="middle" fill="#c9d1d9" font-weight="bold" font-size="13">analyze</text>
  <text x="545" y="196" text-anchor="middle" fill="#484f58" font-size="9">baselines</text>

  <!-- Arrow -->
  <line x1="600" y1="182" x2="630" y2="182" stroke="#2ECC71" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Challenge -->
  <rect x="635" y="156" width="120" height="52" rx="6" fill="#0d1117" stroke="#2ECC71" stroke-width="1.5"/>
  <text x="695" y="178" text-anchor="middle" fill="#2ECC71" font-weight="bold" font-size="13">challenge</text>
  <text x="695" y="196" text-anchor="middle" fill="#484f58" font-size="9">immune system</text>

  <!-- Challenge branch: approved / killed -->
  <!-- Approved arrow going down -->
  <line x1="665" y1="208" x2="665" y2="260" stroke="#2ECC71" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="645" y="240" fill="#2ECC71" font-size="10" text-anchor="end">approved</text>

  <!-- Killed arrow going right -->
  <line x1="755" y1="182" x2="810" y2="182" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow-dim)"/>
  <text x="812" y="170" fill="#484f58" font-size="10">killed</text>
  <!-- X mark -->
  <text x="822" y="192" fill="#484f58" font-size="16">✕</text>

  <!-- Row 2: implement → validate (with fix cycle) → finalize → metrics -->
  <!-- Implement -->
  <rect x="605" y="266" width="120" height="52" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="665" y="288" text-anchor="middle" fill="#c9d1d9" font-weight="bold" font-size="13">implement</text>
  <text x="665" y="306" text-anchor="middle" fill="#484f58" font-size="9">execute + undo</text>

  <!-- Arrow down -->
  <line x1="665" y1="318" x2="665" y2="348" stroke="#2ECC71" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Validate -->
  <rect x="605" y="354" width="120" height="52" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="665" y="376" text-anchor="middle" fill="#c9d1d9" font-weight="bold" font-size="13">validate</text>
  <text x="665" y="394" text-anchor="middle" fill="#484f58" font-size="9">health checks</text>

  <!-- Fix cycle arrow (validate back to implement) -->
  <path d="M 725 374 C 760 374, 760 292, 725 292" fill="none" stroke="#484f58" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-dim)"/>
  <text x="770" y="338" fill="#484f58" font-size="9">fix</text>

  <!-- Arrow left from validate to finalize -->
  <line x1="605" y1="380" x2="525" y2="380" stroke="#2ECC71" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Finalize -->
  <rect x="405" y="354" width="120" height="52" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="465" y="376" text-anchor="middle" fill="#c9d1d9" font-weight="bold" font-size="13">finalize</text>
  <text x="465" y="394" text-anchor="middle" fill="#484f58" font-size="9">natural selection</text>

  <!-- Arrow left to metrics -->
  <line x1="405" y1="380" x2="325" y2="380" stroke="#2ECC71" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Metrics -->
  <rect x="205" y="354" width="120" height="52" rx="6" fill="#0d1117" stroke="#2ECC71" stroke-width="1.5"/>
  <text x="265" y="376" text-anchor="middle" fill="#2ECC71" font-weight="bold" font-size="13">metrics</text>
  <text x="265" y="394" text-anchor="middle" fill="#484f58" font-size="9">nervous system</text>

  <!-- Supporting systems along left side -->
  <!-- Memory -->
  <rect x="55" y="266" width="120" height="40" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="115" y="283" text-anchor="middle" fill="#484f58" font-size="11">memory</text>
  <text x="115" y="298" text-anchor="middle" fill="#3d444d" font-size="9">cross-run state</text>

  <!-- Directives -->
  <rect x="55" y="316" width="120" height="40" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="115" y="333" text-anchor="middle" fill="#484f58" font-size="11">directives</text>
  <text x="115" y="348" text-anchor="middle" fill="#3d444d" font-size="9">instincts</text>

  <!-- Resume -->
  <rect x="55" y="366" width="120" height="40" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="115" y="383" text-anchor="middle" fill="#484f58" font-size="11">resume</text>
  <text x="115" y="398" text-anchor="middle" fill="#3d444d" font-size="9">human re-entry</text>

  <!-- Scoring -->
  <rect x="55" y="416" width="120" height="40" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="115" y="433" text-anchor="middle" fill="#484f58" font-size="11">scoring</text>
  <text x="115" y="448" text-anchor="middle" fill="#3d444d" font-size="9">4-layer feedback</text>

  <!-- Circuit breaker -->
  <rect x="55" y="466" width="120" height="28" rx="6" fill="#0d1117" stroke="#484f58" stroke-width="1"/>
  <text x="115" y="485" text-anchor="middle" fill="#484f58" font-size="10">circuit breaker</text>

  <!-- Dotted lines connecting supporting systems to pipeline -->
  <line x1="175" y1="286" x2="200" y2="182" stroke="#30363d" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="175" y1="380" x2="205" y2="380" stroke="#30363d" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="175" y1="436" x2="205" y2="386" stroke="#30363d" stroke-width="0.5" stroke-dasharray="3,3"/>
</svg>